name: Build & Deploy Jekyll to GitHub Pages

on:
  # Re-deploy every time you push to main
  push:
    branches: [ main ]

  # Manual trigger in the Actions tab
  workflow_dispatch:

permissions:                # GitHub Pages needs these scopes
  contents: read
  pages:    write
  id-token: write

concurrency:                # only one deploy at a time
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # Sets up the special Pages build environment (+bundler, Jekyll, minima, etc.)
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 🔹 The magic one-liner: installs gems (if Gemfile), runs `jekyll build`
      - name: Jekyll build
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site      # ←- output folder

      # Upload _site/ as an artefact for the deploy step
      - name: Upload artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
