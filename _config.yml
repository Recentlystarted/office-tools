# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

# Office Tools - Professional Document & PDF Tools
# A comprehensive suite of online office tools for document conversion and editing

title: "Office Tools - Professional PDF & Document Tools"
email: "support@office-tools.com"
description: >-
  Free online office tools for PDF conversion, document editing, and file management. 
  Merge PDFs, convert PDF to Word, Excel to PDF, and more. Professional tools for daily office tasks.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://office-tools.in" # the base hostname & protocol for your site
twitter_username: officetools
github_username: officetools

# SEO and Meta settings
author: "Office Tools Team"
keywords: "PDF tools, document converter, PDF merger, PDF to Word, Excel to PDF, office tools, free online tools"
google_analytics: "G-XXXXXXXXXX" 
google_verification: "your-google-verification-code"

# Social Media
social:
  name: Office Tools
  links:
    - https://twitter.com/officetools
    - https://github.com/officetools

# Build settings
# theme: minima  # Disabled to use custom Tailwind CSS
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Sass configuration to prevent conflicts with Tailwind CSS
sass:
  style: compressed

# Collections
collections:
  tools:
    output: true
    permalink: /tools/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Office Tools Team"
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"
      author: "Office Tools Team"

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - api.office-tools/
