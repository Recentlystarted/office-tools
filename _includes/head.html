<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
{%- seo -%}

<!-- Comprehensive Favicon Setup -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico">
<link rel="manifest" href="/site.webmanifest">
<meta name="msapplication-TileColor" content="#667eea">
<meta name="theme-color" content="#667eea">

<!-- Tailwind CSS -->
<link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
<!-- Inter Font for better typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
{%- feed_meta -%}
{%- if jekyll.environment == 'production' and site.google_analytics -%}
  {%- include google-analytics.html -%}
{%- endif -%}

<!-- Enhanced SEO Meta Tags -->
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
<meta name="author" content="Office Tools">
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Free online tools for PDF conversion, text processing, QR code generation, and more. No registration required.{% endif %}">
<meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}PDF tools, text converter, QR code generator, online tools, free tools{% endif %}">

<!-- Open Graph Meta Tags -->
<meta property="og:type" content="{% if page.layout == 'tool' %}website{% else %}article{% endif %}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Free online tools for PDF conversion, text processing, QR code generation, and more.{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:image" content="{{ site.url }}/favicon.ico">

<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}Free online tools for PDF conversion, text processing, QR code generation, and more.{% endif %}">
<meta name="twitter:image" content="{{ site.url }}/favicon.ico">

<!-- Preconnect for Performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">
<link rel="dns-prefetch" href="//unpkg.com">

<!-- Mobile Navigation Script -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const menuIcon = document.querySelector('.site-nav .menu-icon');
  const trigger = document.querySelector('.site-nav .trigger');
  
  if (menuIcon && trigger) {
    menuIcon.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      trigger.classList.toggle('active');
    });
    
    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
      if (!menuIcon.contains(e.target) && !trigger.contains(e.target)) {
        trigger.classList.remove('active');
      }
    });
    
    // Close menu when clicking on a link
    const menuLinks = trigger.querySelectorAll('.page-link');
    menuLinks.forEach(link => {
      link.addEventListener('click', function() {
        trigger.classList.remove('active');
      });
    });
  }
  
  // Add smooth scrolling for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });
});
</script>
