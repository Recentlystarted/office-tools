---
layout: default
---

<div class="bg-gradient-to-br from-primary via-primary/90 to-secondary text-primary-foreground">
  <!-- Hero Section -->
  <div class="relative">
    <div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 text-center">
      <h1 class="text-4xl md:text-6xl font-bold mb-6 animate-fade-in">
        Professional Office Tools
      </h1>
      <p class="text-xl md:text-2xl mb-12 text-primary-foreground/90 max-w-3xl mx-auto">
        Free online tools for all your document and PDF needs
      </p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-4xl mx-auto">
        <div class="bg-primary-foreground/10 backdrop-blur-sm rounded-lg p-6 border border-primary-foreground/20">
          <div class="text-3xl font-bold text-yellow-300">50+</div>
          <div class="text-sm text-primary-foreground/80">Tools Available</div>
        </div>
        <div class="bg-primary-foreground/10 backdrop-blur-sm rounded-lg p-6 border border-primary-foreground/20">
          <div class="text-3xl font-bold text-yellow-300">1M+</div>
          <div class="text-sm text-primary-foreground/80">Files Processed</div>
        </div>
        <div class="bg-primary-foreground/10 backdrop-blur-sm rounded-lg p-6 border border-primary-foreground/20">
          <div class="text-3xl font-bold text-yellow-300">100%</div>
          <div class="text-sm text-primary-foreground/80">Free & Secure</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="bg-background">
  {{ content }}
</div>
