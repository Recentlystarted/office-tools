---
layout: default
---

<div class="max-w-4xl mx-auto">
  <header class="mb-8">
    <h1 class="text-4xl font-bold text-foreground">{{ page.title }}</h1>
    {% if page.description %}
      <p class="text-xl text-muted-foreground mt-4">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose prose-lg max-w-none">
    {{ content }}
  </div>
</div>
