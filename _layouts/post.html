---
layout: default
---

<article class="max-w-4xl mx-auto">
  <header class="mb-8">
    <h1 class="text-4xl font-bold text-foreground mb-4">{{ page.title }}</h1>
    <div class="flex items-center space-x-4 text-muted-foreground text-sm">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.author %}
        <span>by {{ page.author }}</span>
      {% endif %}
    </div>
  </header>

  <div class="prose prose-lg max-w-none">
    {{ content }}
  </div>

  {% if page.tags.size > 0 %}
    <footer class="mt-8 pt-6 border-t border-border">
      <div class="flex flex-wrap gap-2">
        {% for tag in page.tags %}
          <span class="badge-secondary">{{ tag }}</span>
        {% endfor %}
      </div>
    </footer>
  {% endif %}
</article>
