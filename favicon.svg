<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad)" stroke="#1565C0" stroke-width="1"/>
  
  <!-- Document icon -->
  <rect x="8" y="6" width="12" height="16" rx="1" fill="white" opacity="0.9"/>
  <rect x="8" y="6" width="12" height="3" rx="1" fill="white"/>
  
  <!-- Tool/gear icon overlay -->
  <circle cx="22" cy="10" r="4" fill="#FF9800" stroke="white" stroke-width="1"/>
  <circle cx="22" cy="10" r="2" fill="white"/>
  
  <!-- Lines representing document content -->
  <line x1="10" y1="12" x2="18" y2="12" stroke="#1976D2" stroke-width="1" opacity="0.7"/>
  <line x1="10" y1="15" x2="16" y2="15" stroke="#1976D2" stroke-width="1" opacity="0.7"/>
  <line x1="10" y1="18" x2="17" y2="18" stroke="#1976D2" stroke-width="1" opacity="0.7"/>
</svg>
